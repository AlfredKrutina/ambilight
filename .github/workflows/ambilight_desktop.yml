# AmbiLight Desktop — matice: analyze + test na všech OS; navíc desktop build (CMake) pro validaci runnerů.
# Lokální ekvivalent: viz ambilight_desktop/README_RUN.md a context/DESKTOP_TARGETS.md

name: ambilight_desktop

on:
  push:
    paths:
      - "ambilight_desktop/**"
      - ".github/workflows/ambilight_desktop.yml"
      - "README.md"
  pull_request:
    paths:
      - "ambilight_desktop/**"
      - ".github/workflows/ambilight_desktop.yml"
      - "README.md"

jobs:
  desktop-ci:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        working-directory: ambilight_desktop

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev \
            libayatana-appindicator3-dev \
            libsecret-1-dev \
            libudev-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze

      - name: Flutter test
        run: flutter test

      - name: Flutter build linux
        if: runner.os == 'Linux'
        run: flutter build linux --debug

      - name: Flutter build windows
        if: runner.os == 'Windows'
        run: flutter build windows --debug

      - name: Flutter build macos
        if: runner.os == 'macOS'
        run: flutter build macos --debug
