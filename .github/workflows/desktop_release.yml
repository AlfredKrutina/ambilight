# Windows: ZIP (auto-update) + Inno Setup .exe | macOS: DMG | Linux: tar.gz bundle | manifest po všech buildích.
# Push na main/master → rolling release pod tagem desktop-main (verze z pubspec).
# Volitelně tag desktop-v1.0.4 → semver release (pubspec musí sedět s částí za desktop-v).
name: desktop_release

on:
  push:
    branches: [main, master]
    tags:
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ambilight_desktop
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Verify pubspec version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $want = $env:TAG -replace '^desktop-v',''
          $line = (Get-Content -LiteralPath pubspec.yaml | Where-Object { $_ -match '^\s*version:\s*' } | Select-Object -First 1)
          if (-not $line) { throw "pubspec.yaml: missing version line" }
          if ($line -notmatch 'version:\s*(\S+)') { throw "pubspec.yaml: cannot parse version" }
          $pub = $Matches[1].Split('+')[0].Trim()
          if ($pub -ne $want) {
            throw "pubspec version '$pub' does not match tag '$env:TAG' (expected SemVer '$want' after desktop-v prefix)."
          }
          Write-Host "OK: pubspec version $pub matches tag."

      - name: Build Windows release
        run: >-
          flutter build windows --release
          --dart-define=GIT_SHA=${{ github.sha }}
          --dart-define=AMBI_CHANNEL=stable

      - name: Zip Release (včetně data/)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $winBuild = Join-Path (Get-Location) 'build\windows'
          $rel = @(
            (Join-Path $winBuild 'x64\runner\Release'),
            (Join-Path $winBuild 'runner\Release')
          ) | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (-not $rel) {
            Write-Host "Obsah build/windows:"
            Get-ChildItem -Recurse -Depth 4 $winBuild -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
            throw "ZIP: složka Release nenalezena (ocekavano build/windows/x64/runner/Release)."
          }
          Write-Host "ZIP from: $rel"
          $zip = Join-Path $env:GITHUB_WORKSPACE 'ambilight_desktop_windows_x64.zip'
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Push-Location $rel
          try {
            Compress-Archive -Path * -DestinationPath $zip -CompressionLevel Optimal -Force
          } finally {
            Pop-Location
          }
          Write-Host "ZIP OK: $zip"

      - name: Install Inno Setup
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: choco install innosetup --no-progress -y

      - name: Build Inno Setup installer (.exe)
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: |
          $ErrorActionPreference = 'Stop'
          $refName = $env:GITHUB_REF_NAME
          if ($refName -match '^desktop-v') {
            $ver = $refName -replace '^desktop-v',''
          } else {
            $line = Get-Content -LiteralPath 'ambilight_desktop/pubspec.yaml' | Where-Object { $_ -match '^\s*version:\s*' } | Select-Object -First 1
            if (-not $line -or $line -notmatch 'version:\s*(\S+)') { throw "ambilight_desktop/pubspec.yaml: missing or invalid version line" }
            $ver = $Matches[1].Split('+')[0].Trim()
          }
          $winBuild = Join-Path (Get-Location) 'ambilight_desktop\build\windows'
          $relCandidates = @(
            (Join-Path $winBuild 'x64\runner\Release'),
            (Join-Path $winBuild 'runner\Release')
          )
          $rel = $relCandidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (-not $rel) {
            Write-Host "Flutter Release složka nenalezena. Obsah build/windows:"
            Get-ChildItem -Recurse -Depth 4 $winBuild -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
            throw "ambilight_desktop/build/windows/.../Release neexistuje — zkontroluj flutter build windows."
          }
          Write-Host "Using Release dir: $rel"
          $out = Join-Path (Get-Location) 'dist'
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $iss = Join-Path (Get-Location) 'tools\ambilight_windows_setup.iss'
          $iscc = @(
            (Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'),
            'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          ) | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (-not $iscc) {
            $found = Get-ChildItem -Path 'C:\Program Files*\Inno Setup*\ISCC.exe' -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
            if ($found) { $iscc = $found }
          }
          if (-not $iscc) { throw "ISCC.exe not found (install Inno Setup 6 via choco)." }
          Write-Host "Using ISCC: $iscc"
          & $iscc /DMyAppVersion=$ver /DMyAppSource="$rel" /DMyAppOutput="$out" "$iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC exited with code $LASTEXITCODE" }
          $exe = Join-Path $out 'ambilight_desktop_windows.exe'
          if (-not (Test-Path -LiteralPath $exe)) {
            Write-Host "Obsah dist:"
            Get-ChildItem -Force $out | ForEach-Object { $_.Name }
            throw "Ocekavan ambilight_desktop_windows.exe v dist — Inno OutputBaseFilename musi sedet s .iss."
          }
          Write-Host "Installer OK: $exe ($((Get-Item $exe).Length) bytes)"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-release
          path: |
            ${{ github.workspace }}/ambilight_desktop_windows_x64.zip
            ${{ github.workspace }}/dist/ambilight_desktop_windows.exe

  macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ambilight_desktop
    steps:
      - uses: actions/checkout@v4

      - name: Install macOS CocoaPods / libserialport build deps + DMG tooling
        run: brew install automake libtool create-dmg

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verify pubspec version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          want="${TAG#desktop-v}"
          line="$(grep -E '^\s*version:\s*' pubspec.yaml | head -1)"
          pub="$(echo "$line" | sed -E 's/^\s*version:\s*([^ +]+).*/\1/')"
          if [[ "$pub" != "$want" ]]; then
            echo "pubspec version '$pub' does not match tag '$TAG' (want '$want')"
            exit 1
          fi
          echo "OK: pubspec version $pub matches tag."

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter build macos
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGN_IDENTITY: "-"
        run: >-
          flutter build macos --release
          --dart-define=GIT_SHA=${{ github.sha }}
          --dart-define=AMBI_CHANNEL=stable

      - name: Create DMG (staging + Applications)
        shell: bash
        env:
          # Zapne AppleScript create-dmg = ikony + tapeta dle tools/build_macos_dmg.sh (ne --skip-jenkins).
          CREATE_DMG_USE_FINDER_LAYOUT: "1"
        run: |
          set -euo pipefail
          ref="${GITHUB_REF_NAME}"
          if [[ "$ref" == desktop-v* ]]; then
            ver="${ref#desktop-v}"
          else
            line="$(grep -E '^\s*version:\s*' pubspec.yaml | head -1)"
            ver="$(echo "$line" | sed -E 's/^\s*version:\s*([^ +]+).*/\1/')"
          fi
          ROOT="${GITHUB_WORKSPACE}"
          APP="${ROOT}/ambilight_desktop/build/macos/Build/Products/Release/ambilight_desktop.app"
          OUT="${ROOT}/ambilight_desktop_macos.dmg"
          test -d "$APP"
          bash "${ROOT}/tools/build_macos_dmg.sh" "$APP" "$OUT" "AmbiLight ${ver}"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-dmg
          path: ${{ github.workspace }}/ambilight_desktop_macos.dmg

  linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ambilight_desktop
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev \
            libayatana-appindicator3-dev \
            libsecret-1-dev \
            libudev-dev \
            libx11-dev libxrandr-dev \
            libpulse-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verify pubspec version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          want="${TAG#desktop-v}"
          line="$(grep -E '^\s*version:\s*' pubspec.yaml | head -1)"
          pub="$(echo "$line" | sed -E 's/^\s*version:\s*([^ +]+).*/\1/')"
          if [[ "$pub" != "$want" ]]; then
            echo "pubspec version '$pub' does not match tag '$TAG' (want '$want')"
            exit 1
          fi
          echo "OK: pubspec version $pub matches tag."

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter build linux
        run: >-
          flutter build linux --release
          --dart-define=GIT_SHA=${{ github.sha }}
          --dart-define=AMBI_CHANNEL=stable

      - name: Pack Linux bundle (.tar.gz)
        shell: bash
        run: |
          set -euo pipefail
          bundle="build/linux/x64/release/bundle"
          test -d "$bundle"
          tar -C "$bundle" -czf "${GITHUB_WORKSPACE}/ambilight_desktop_linux_x64.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-tarball
          path: ${{ github.workspace }}/ambilight_desktop_linux_x64.tar.gz

  publish:
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Rolling release — smaž starý desktop-main (jen push na větev)
        if: github.ref_type == 'branch'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete desktop-main --yes --cleanup-tag 2>/dev/null || true

      - name: Resolve release tag a manifest verzi
        id: rel
        run: |
          set -euo pipefail
          if [[ "${{ github.ref }}" == refs/tags/desktop-v* ]]; then
            echo "release_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "manifest_version=" >> "$GITHUB_OUTPUT"
            echo "display_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            line=$(grep -E '^\s*version:' ambilight_desktop/pubspec.yaml | head -1)
            pub=$(echo "$line" | sed -E 's/^\s*version:\s*([^ +]+).*/\1/')
            echo "release_tag=desktop-main" >> "$GITHUB_OUTPUT"
            echo "manifest_version=$pub" >> "$GITHUB_OUTPUT"
            echo "display_name=desktop-main (pubspec $pub, ${{ github.sha }})" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          name: desktop-windows-release
          path: artifacts/win

      - uses: actions/download-artifact@v4
        with:
          name: desktop-macos-dmg
          path: artifacts/mac

      - uses: actions/download-artifact@v4
        with:
          name: desktop-linux-tarball
          path: artifacts/lin

      - name: Write desktop-manifest.json
        run: |
          set -euo pipefail
          if [[ -n "${{ steps.rel.outputs.manifest_version }}" ]]; then
            python3 tools/assemble_desktop_release_manifest.py \
              --repo "${{ github.repository }}" \
              --tag "${{ steps.rel.outputs.release_tag }}" \
              --manifest-version "${{ steps.rel.outputs.manifest_version }}" \
              --zip artifacts/win/ambilight_desktop_windows_x64.zip \
              --out desktop-manifest.json
          else
            python3 tools/assemble_desktop_release_manifest.py \
              --repo "${{ github.repository }}" \
              --tag "${{ steps.rel.outputs.release_tag }}" \
              --zip artifacts/win/ambilight_desktop_windows_x64.zip \
              --out desktop-manifest.json
          fi

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rel.outputs.release_tag }}
          name: ${{ steps.rel.outputs.display_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts/win/ambilight_desktop_windows_x64.zip
            artifacts/win/ambilight_desktop_windows.exe
            artifacts/mac/ambilight_desktop_macos.dmg
            artifacts/lin/ambilight_desktop_linux_x64.tar.gz
            desktop-manifest.json
