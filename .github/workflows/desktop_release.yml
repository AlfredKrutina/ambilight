# Windows: ZIP (auto-update) + Inno Setup .exe | macOS: DMG | manifest se skládá až po obou buildích.
# Tag: desktop-v1.0.4  →  verze v manifestu 1.0.4 (pubspec.yaml musí sedět)
name: desktop_release

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ambilight_desktop
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Verify pubspec version matches tag
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        run: |
          $want = $env:TAG -replace '^desktop-v',''
          $line = (Get-Content -LiteralPath pubspec.yaml | Where-Object { $_ -match '^\s*version:\s*' } | Select-Object -First 1)
          if (-not $line) { throw "pubspec.yaml: missing version line" }
          if ($line -notmatch 'version:\s*(\S+)') { throw "pubspec.yaml: cannot parse version" }
          $pub = $Matches[1].Split('+')[0].Trim()
          if ($pub -ne $want) {
            throw "pubspec version '$pub' does not match tag '$env:TAG' (expected SemVer '$want' after desktop-v prefix)."
          }
          Write-Host "OK: pubspec version $pub matches tag."

      - name: Build Windows release
        run: >-
          flutter build windows --release
          --dart-define=GIT_SHA=${{ github.sha }}
          --dart-define=AMBI_CHANNEL=stable

      - name: Zip Release (včetně data/)
        shell: pwsh
        run: |
          $rel = Join-Path (Get-Location) 'build/windows/x64/runner/Release'
          $zip = Join-Path $env:GITHUB_WORKSPACE 'ambilight_desktop_windows_x64.zip'
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Push-Location $rel
          try {
            Compress-Archive -Path * -DestinationPath $zip -CompressionLevel Optimal -Force
          } finally {
            Pop-Location
          }
          Write-Host "ZIP OK: $zip"

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Inno Setup installer (.exe)
        shell: pwsh
        env:
          TAG: ${{ github.ref_name }}
        working-directory: ${{ github.workspace }}
        run: |
          $ver = $env:TAG -replace '^desktop-v',''
          $rel = Join-Path (Get-Location) 'ambilight_desktop\build\windows\x64\runner\Release'
          $out = Join-Path (Get-Location) 'dist'
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $iss = Join-Path (Get-Location) 'tools\ambilight_windows_setup.iss'
          $isccRoot = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          if (-not (Test-Path -LiteralPath $isccRoot)) {
            $isccRoot = 'C:\Program Files (x86)\Inno Setup 6\ISCC.exe'
          }
          if (-not (Test-Path -LiteralPath $isccRoot)) { throw "ISCC.exe not found after choco install innosetup" }
          & $isccRoot /DMyAppVersion=$ver /DMyAppSource="$rel" /DMyAppOutput="$out" "$iss"
          $exe = Join-Path $out 'ambilight_desktop_windows_x64_setup.exe'
          if (-not (Test-Path -LiteralPath $exe)) { throw "Inno did not produce setup exe" }

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-release
          path: |
            ${{ github.workspace }}/ambilight_desktop_windows_x64.zip
            ${{ github.workspace }}/dist/ambilight_desktop_windows_x64_setup.exe

  macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ambilight_desktop
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Verify pubspec version matches tag
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          want="${TAG#desktop-v}"
          line="$(grep -E '^\s*version:\s*' pubspec.yaml | head -1)"
          pub="$(echo "$line" | sed -E 's/^\s*version:\s*([^ +]+).*/\1/')"
          if [[ "$pub" != "$want" ]]; then
            echo "pubspec version '$pub' does not match tag '$TAG' (want '$want')"
            exit 1
          fi
          echo "OK: pubspec version $pub matches tag."

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter build macos
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGN_IDENTITY: "-"
        run: >-
          flutter build macos --release
          --dart-define=GIT_SHA=${{ github.sha }}
          --dart-define=AMBI_CHANNEL=stable

      - name: Create DMG
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ver="${TAG#desktop-v}"
          app="build/macos/Build/Products/Release/ambilight_desktop.app"
          test -d "$app"
          hdiutil create -volname "AmbiLight ${ver}" -srcfolder "$app" -ov -format UDZO "${GITHUB_WORKSPACE}/ambilight_desktop_macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-dmg
          path: ${{ github.workspace }}/ambilight_desktop_macos.dmg

  publish:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: desktop-windows-release
          path: artifacts/win

      - uses: actions/download-artifact@v4
        with:
          name: desktop-macos-dmg
          path: artifacts/mac

      - name: Write desktop-manifest.json
        run: |
          python3 tools/assemble_desktop_release_manifest.py \
            --repo "${{ github.repository }}" \
            --tag "${{ github.ref_name }}" \
            --zip artifacts/win/ambilight_desktop_windows_x64.zip \
            --out desktop-manifest.json

      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/win/ambilight_desktop_windows_x64.zip
            artifacts/win/ambilight_desktop_windows_x64_setup.exe
            artifacts/mac/ambilight_desktop_macos.dmg
            desktop-manifest.json
