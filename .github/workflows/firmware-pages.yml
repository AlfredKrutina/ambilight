# Sestaví ESP-IDF firmware a nasadí statický web na GitHub Pages (zdroj: GitHub Actions).
# V repozitáři: Settings → Pages → Build and deployment → Source: „GitHub Actions“ (ne větev gh-pages).
name: firmware_pages

on:
  push:
    branches: [main, master]
    paths:
      - "led_strip_monitor_pokus - Copy/esp32c3_firmware/**"
      - ".github/workflows/firmware-pages.yml"
      - "tools/gen_firmware_manifest.py"
      - "tools/firmware_index.html"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-firmware
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build firmware (ESP-IDF Docker)
        run: |
          set -eux
          FW='led_strip_monitor_pokus - Copy/esp32c3_firmware'
          docker run --rm \
            -v "${{ github.workspace }}:/project" \
            -w "/project/${FW}" \
            espressif/idf:v5.3.2 \
            bash -lc 'idf.py fullclean && idf.py build'

      - name: Assemble site (root = Pages)
        run: |
          set -eux
          FW='led_strip_monitor_pokus - Copy/esp32c3_firmware'
          BUILD="${FW}/build"
          SITE="${{ github.workspace }}/_site/firmware/latest"
          mkdir -p "${SITE}"
          cp "${BUILD}/bootloader/bootloader.bin" "${SITE}/"
          cp "${BUILD}/partition_table/partition-table.bin" "${SITE}/"
          cp "${BUILD}/ambilight_esp32c6.bin" "${SITE}/"
          VER=$(echo "${{ github.sha }}" | cut -c1-12)
          BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/firmware/latest"
          python3 tools/gen_firmware_manifest.py \
            --build-dir "${BUILD}" \
            --out "${SITE}/manifest.json" \
            --base-url "${BASE}" \
            --version "${VER}" \
            --chip esp32c6
          cp tools/firmware_index.html "${{ github.workspace }}/_site/index.html"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
