# Sestaví ESP-IDF firmware (projekt LAMPA) a nasadí statický web na GitHub Pages.
# Zdroj kódu: led_strip_monitor_pokus - Copy/esp32c3_lamp_firmware/ (ne legacy monitor).
# Spuštění: push na main/master | ručně | po úspěšném dokončení workflow desktop_release (mirror desktop/latest).
# V repozitáři: Settings → Pages → Build and deployment → Source: „GitHub Actions“ (ne větev gh-pages).
name: firmware_pages

on:
  push:
    branches: [main, master]
    # Bez paths: — jinak se workflow po většině commitů vůbec nespustí a Pages „nezlobí“.
  workflow_dispatch:
  workflow_run:
    workflows: [desktop_release]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-firmware
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CHECKOUT_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_SHA }}

      # Monorepo + ESP-IDF snadno překročí výchozí volné GB na ubuntu-latest → Docker/build končí „No space“ nebo OOM.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h

      - name: Pull ESP-IDF image
        run: docker pull espressif/idf:v5.5.1

      - name: Build firmware (ESP-IDF Docker)
        run: |
          set -eux
          FW='led_strip_monitor_pokus - Copy/esp32c3_lamp_firmware'
          # Nepoužívat idf.py fullclean: u trackovaných managed_components spouští kontrolu hashe a často spadne v CI.
          # Čistý build: smazat build + managed_components.
          # ESP-IDF 5.5: idf.py build nepřijímá -j — paralelismus řídí CMAKE_BUILD_PARALLEL_LEVEL (ninja).
          run_build() {
            docker run --rm \
              -v "${{ github.workspace }}:/project" \
              -w "/project/${FW}" \
              espressif/idf:v5.5.1 \
              bash -lc 'rm -rf build managed_components && export CMAKE_BUILD_PARALLEL_LEVEL=2 && idf.py build'
          }
          attempt=1
          max=3
          until run_build; do
            attempt=$((attempt + 1))
            if [ "$attempt" -gt "$max" ]; then
              echo "ESP-IDF Docker build failed after $max attempts"
              exit 1
            fi
            echo "Retry $attempt/$max after 60s..."
            sleep 60
          done

      - name: Assemble site (root = Pages)
        run: |
          set -eux
          ROOT="${{ github.workspace }}"
          FW='led_strip_monitor_pokus - Copy/esp32c3_lamp_firmware'
          BUILD="${ROOT}/${FW}/build"
          SITE="${ROOT}/_site/firmware/latest"
          mkdir -p "${SITE}"
          test -f "${BUILD}/bootloader/bootloader.bin"
          test -f "${BUILD}/partition_table/partition-table.bin"
          test -f "${BUILD}/ambilight_esp32c6.bin"
          cp "${BUILD}/bootloader/bootloader.bin" "${SITE}/"
          cp "${BUILD}/partition_table/partition-table.bin" "${SITE}/"
          cp "${BUILD}/ambilight_esp32c6.bin" "${SITE}/"
          VER=$(echo "${{ env.CHECKOUT_SHA }}" | cut -c1-12)
          BASE="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/firmware/latest"
          python3 "${ROOT}/tools/gen_firmware_manifest.py" \
            --build-dir "${BUILD}" \
            --out "${SITE}/manifest.json" \
            --base-url "${BASE}" \
            --version "${VER}" \
            --chip esp32c6
          cp "${ROOT}/tools/firmware_index.html" "${ROOT}/_site/index.html"
          REPO="${{ github.repository }}"
          sed -i "s|<meta name=\"github-repo\" content=\"[^\"]*\"|<meta name=\"github-repo\" content=\"${REPO}\"|" "${ROOT}/_site/index.html"
          grep -Fq "<meta name=\"github-repo\" content=\"${REPO}\"" "${ROOT}/_site/index.html" || { echo "github-repo meta patch failed"; exit 1; }
          mkdir -p "${ROOT}/_site/assets"
          if [ -d "${ROOT}/tools/pages_assets" ]; then
            find "${ROOT}/tools/pages_assets" -maxdepth 1 -type f \( \
              -name '*.webp' -o -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' \
              -o -name '*.webm' -o -name '*.mp4' -o -name '*.svg' \) \
              -exec cp -t "${ROOT}/_site/assets" {} +
          fi

      # Nejnovější desktop-v*; když chybí, rolling desktop-main (push na main bez ručního tagu).
      - name: Mirror desktop release assets (GitHub → Pages)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eux
          DEST="${{ github.workspace }}/_site/desktop/latest"
          mkdir -p "$DEST"
          cd "$DEST"
          TAG="$(gh api "repos/${{ github.repository }}/releases?per_page=80" --jq '[.[] | select(.draft | not)] | (map(select(.tag_name | startswith("desktop-v"))) | if length > 0 then max_by(.published_at).tag_name else empty end) // (map(select(.tag_name == "desktop-main")) | if length > 0 then max_by(.published_at).tag_name else empty end)')"
          if [ -z "${TAG:-}" ]; then
            echo "Žádný desktop release (desktop-v* ani desktop-main) — desktop/latest zůstane prázdný."
            echo "none" > desktop-release-tag.txt
            ls -la
            exit 0
          fi
          echo "$TAG" > desktop-release-tag.txt
          echo "Mirror desktop release: $TAG"
          for f in \
            ambilight_desktop_windows_x64.zip \
            ambilight_desktop_windows.exe \
            ambilight_desktop_macos.dmg \
            ambilight_desktop_linux_x64.tar.gz \
            desktop-manifest.json \
          ; do
            gh release download -R "${{ github.repository }}" "$TAG" --pattern "$f" --clobber -D . || true
          done
          ls -la

      - name: Upload static site as CI artifact (sdílení / záloha)
        uses: actions/upload-artifact@v4
        with:
          name: ambilight-pages-site
          path: _site
          retention-days: 30

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
