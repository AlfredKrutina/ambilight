name: ambilight_desktop
description: Cross-platform AmbiLight desktop client (Flutter). Firmware-compatible with esp32c3 ambilight.c.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  collection: ^1.18.0
  crypto: ^3.0.6
  file_picker: ^8.1.7
  flutter_libserialport: ^0.6.0
  http: ^1.3.0
  image: ^4.5.4
  launch_at_startup: ^0.5.1
  logging: ^1.2.0
  path: ^1.9.0
  path_provider: ^2.1.4
  provider: ^6.1.2
  # 5.x → record_linux 0.7.x nekompatibilní s Dart 3.41+ / Flutter 3.41 (chyba hasPermission při windows buildu).
  record: ^6.2.0
  screen_retriever: ^0.2.0
  url_launcher: ^6.3.1
  fftea: ^1.5.0+1
  tray_manager: ^0.5.2
  window_manager: ^0.5.0
  package_info_plus: ^8.1.2
  uni_platform: 0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/branding/app_icon_dark.png
    - assets/branding/app_icon_light.png
